<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Laptop Reservering ISK</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --bg:#d6eaf8; --surface:#fff; --surface2:#e8f4fd; --border:#a8cfe8;
    --text:#0d2a45; --muted:#3a6a90; --accent:#1565c0; --accent-light:#cce4f7;
    --priority:#c62828; --priority-bg:#ffebee;
    --vac-bg:#c8e6c9; --vac-fg:#1b5e20;
    --free-bg:#f0f0f0;
  }

  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

  body {
    font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text);
    min-height:100vh; max-width:480px; margin:0 auto;
  }

  /* LOGIN */
  #loginScreen {
    position:fixed; inset:0;
    background:linear-gradient(160deg,#0d47a1,#1976d2);
    display:flex; align-items:center; justify-content:center;
    z-index:999; padding:24px;
  }
  .login-box { background:#fff; border-radius:20px; padding:36px 28px; width:100%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.25); }
  .login-logo { font-size:2.5rem; margin-bottom:8px; }
  .login-box h2 { font-size:1.15rem; font-weight:800; color:var(--accent); margin-bottom:4px; }
  .login-box p  { font-size:.82rem; color:var(--muted); margin-bottom:24px; }
  .login-box input { width:100%; padding:14px 16px; border:2px solid var(--border); border-radius:12px; font-family:inherit; font-size:1rem; text-align:center; letter-spacing:.1em; margin-bottom:10px; }
  .login-box input:focus { outline:none; border-color:var(--accent); }
  .login-err  { font-size:.78rem; color:#c62828; min-height:18px; margin-bottom:8px; }
  .login-btn  { width:100%; padding:14px; background:var(--accent); color:#fff; border:none; border-radius:12px; font-family:inherit; font-size:1rem; font-weight:800; cursor:pointer; }

  /* HEADER */
  header {
    background:linear-gradient(90deg,#0d47a1,#1976d2); color:#fff;
    padding:12px 16px 10px; position:sticky; top:0; z-index:50;
    box-shadow:0 2px 8px rgba(13,71,161,.3);
  }
  .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  header h1   { font-size:.95rem; font-weight:800; }
  header .sub { font-size:.7rem; opacity:.7; margin-top:1px; }
  .sync-dot   { width:8px; height:8px; border-radius:50%; background:#90caf9; }
  .sync-dot.syncing { background:#ffcc02; animation:pulse 1s infinite; }
  .sync-dot.ok      { background:#66bb6a; }
  .sync-dot.err     { background:#ef5350; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

  .week-row { display:flex; align-items:center; gap:8px; }
  .week-row span { font-size:.72rem; opacity:.8; }
  .week-row select {
    flex:1; padding:5px 8px; border:1px solid rgba(255,255,255,.3);
    border-radius:8px; background:rgba(255,255,255,.15); color:#fff;
    font-family:inherit; font-size:.8rem; -webkit-appearance:none;
  }
  .week-row select option { background:#1565c0; color:#fff; }

  /* DAG NAV */
  .day-nav { display:flex; align-items:center; background:var(--surface); border-bottom:2px solid var(--border); }
  .day-arrow { width:52px; height:58px; display:flex; align-items:center; justify-content:center; background:none; border:none; font-size:1.5rem; color:var(--accent); cursor:pointer; }
  .day-arrow:disabled { color:#ccc; }
  .day-info { flex:1; text-align:center; padding:10px 4px; cursor:pointer; }
  .day-name { font-size:1.05rem; font-weight:800; }
  .day-date { font-size:.78rem; color:var(--muted); margin-top:1px; }
  .day-date.today { color:var(--accent); font-weight:700; }

  /* KAR TABS */
  .kar-tabs { display:flex; overflow-x:auto; gap:6px; padding:8px 12px; background:var(--surface); border-bottom:1px solid var(--border); scrollbar-width:none; }
  .kar-tabs::-webkit-scrollbar { display:none; }
  .kar-tab { flex-shrink:0; padding:7px 16px; border-radius:20px; border:2px solid var(--border); background:var(--surface2); font-family:inherit; font-size:.82rem; font-weight:700; color:var(--muted); cursor:pointer; }
  .kar-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }

  /* CONTENT */
  .content { padding:12px; }

  .vacation-banner { background:var(--vac-bg); border:2px solid #81c784; border-radius:16px; padding:28px 16px; text-align:center; }
  .vacation-banner .icon  { font-size:3rem; margin-bottom:8px; }
  .vacation-banner .title { font-size:1.2rem; font-weight:800; color:var(--vac-fg); }
  .vacation-banner .sub   { font-size:.82rem; color:#388e3c; margin-top:4px; }

  .free-banner { background:var(--free-bg); border:2px solid #bbb; border-radius:16px; padding:24px 16px; text-align:center; }
  .free-banner .icon  { font-size:2.5rem; margin-bottom:6px; }
  .free-banner .title { font-size:1rem; font-weight:800; color:#666; }

  .hour-card { border-radius:14px; margin-bottom:10px; overflow:hidden; box-shadow:0 1px 6px rgba(21,101,192,.1); }
  .hour-header { padding:11px 14px; display:flex; align-items:center; justify-content:space-between; }
  .hour-title  { font-size:.92rem; font-weight:800; }
  .hour-time   { font-size:.72rem; opacity:.7; margin-top:1px; }
  .hour-avail  { font-size:.78rem; font-weight:800; background:rgba(255,255,255,.55); padding:4px 12px; border-radius:12px; }
  .hour-body   { background:#fff; padding:8px; }

  .res-card { border-radius:10px; padding:11px 13px; margin-bottom:6px; }
  .res-card:last-child { margin-bottom:0; }
  .res-normal   { background:#e3f2fd; border-left:4px solid #1565c0; }
  .res-priority { background:var(--priority-bg); border-left:4px solid var(--priority); }
  .res-name   { font-size:.98rem; font-weight:800; letter-spacing:.04em; }
  .res-detail { font-size:.78rem; color:var(--muted); margin-top:4px; display:flex; flex-wrap:wrap; gap:5px; align-items:center; }
  .res-badge  { display:inline-block; font-size:.65rem; font-weight:800; padding:2px 7px; border-radius:4px; }
  .badge-prio  { background:var(--priority); color:#fff; }
  .badge-weeks { background:var(--accent); color:#fff; }
  .res-edited  { font-size:.7rem; color:#e65100; margin-top:4px; font-style:italic; }

  .hour-empty { padding:14px; text-align:center; color:#aaa; font-size:.82rem; }

  .swipe-hint { text-align:center; font-size:.72rem; color:var(--muted); padding:10px; opacity:.5; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">💻</div>
    <h2>Laptop Reservering ISK Almelo</h2>
    <p>Voer het wachtwoord in</p>
    <input type="password" id="pwInput" placeholder="Wachtwoord" autocomplete="off"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" onclick="doLogin()">Inloggen</button>
  </div>
</div>

<div id="app" style="display:none">

  <header>
    <div class="header-top">
      <div>
        <h1>💻 Laptop Reservering ISK Almelo</h1>
        <div class="sub">Periode 4 · 2026 · alleen lezen</div>
      </div>
      <div class="sync-dot" id="syncDot"></div>
    </div>
    <div class="week-row">
      <span>Week:</span>
      <select id="weekSelect" onchange="onWeekChange()"></select>
    </div>
  </header>

  <div class="day-nav">
    <button class="day-arrow" id="prevDay" onclick="changeDay(-1)">‹</button>
    <div class="day-info" onclick="jumpToToday()">
      <div class="day-name" id="dayName">Maandag</div>
      <div class="day-date" id="dayDate">6 apr</div>
    </div>
    <button class="day-arrow" id="nextDay" onclick="changeDay(1)">›</button>
  </div>

  <div class="kar-tabs" id="karTabs"></div>

  <div class="content" id="mainContent">
    <div style="text-align:center;padding:40px 0">
      <div style="width:32px;height:32px;border:3px solid #a8cfe8;border-top-color:#1565c0;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px"></div>
      <div style="font-size:.85rem;color:#3a6a90">Laden…</div>
    </div>
  </div>

</div>

<script>
const PASSWORD    = 'ISK2026!';
const SUPABASE_URL   = 'https://wloyopcooskxvrqmrojv.supabase.co';
const SUPABASE_KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indsb3lvcGNvb3NreHZycW1yb2p2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTg1MTcsImV4cCI6MjA5MTEzNDUxN30.3MH_WcCAIXxUjXvk_9Y-QO4l8itLEmwDIv7nXdxR354';
const SUPABASE_TABLE = 'rooster';
const SUPABASE_ROW   = 1;
const AUTH_KEY    = 'iskMobielAuth';
const CACHE_KEY   = 'iskRoosterData_p4';

const DAYS_NL   = ['Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag'];
const SHORT_MON = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
const HOURS     = [
  { label:'1e uur', time:'08:30–09:10', bg:'#e8f4fd', hb:'#bbdefb' },
  { label:'2e uur', time:'09:10–10:30', bg:'#f3e8fd', hb:'#e1bee7' },
  { label:'3e uur', time:'10:50–12:10', bg:'#e8fdf4', hb:'#b2dfdb' },
  { label:'4e uur', time:'12:40–14:00', bg:'#fdf6e8', hb:'#ffe0b2' },
  { label:'5e uur', time:'14:20–15:40', bg:'#fde8ee', hb:'#ffcdd2' },
];
const KARREN          = [{id:0,name:'Laptopkar 1',laptops:24},{id:1,name:'Laptopkar 2',laptops:24},{id:2,name:'Laptopkar 3',laptops:24},{id:3,name:'Laptopkar 4',laptops:24},{id:4,name:'Laptopkar 5',laptops:24}];
const PRIORITY_VAKKEN = ['ICT','Engels','Burgerschap','JIJ-toets'];
const VACATION_MONDAYS= ['2026-04-20','2026-04-27'];
const FREE_DAYS       = ['2026-04-06','2026-05-04','2026-05-05','2026-05-14','2026-05-15','2026-05-25','2026-05-28','2026-06-18'];

const TODAY = new Date(); TODAY.setHours(0,0,0,0);
let db={}; let ALL_WEEKS=[]; let currentWeekIdx=0; let currentDayIdx=0; let selectedKar=0;

function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function fmtDate(d){ return `${d.getDate()} ${SHORT_MON[d.getMonth()]}`; }
function dateToStr(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function isToday(d){ return d.getFullYear()===TODAY.getFullYear()&&d.getMonth()===TODAY.getMonth()&&d.getDate()===TODAY.getDate(); }
function isVacationWeek(wi){ return VACATION_MONDAYS.includes(dateToStr(ALL_WEEKS[wi].monday)); }
function isFreeDay(d){ return FREE_DAYS.includes(dateToStr(d)); }

function buildWeeks(){
  ALL_WEEKS=[];
  const S=new Date(2026,3,6); S.setHours(0,0,0,0);
  const E=new Date(2026,5,23); E.setHours(23,59,59,0);
  let c=new Date(S),i=1;
  while(c<=E){ ALL_WEEKS.push({index:i++,monday:new Date(c)}); c=addDays(c,7); }

  const day=TODAY.getDay();
  const mon=day===0?-6:1-day;
  const target=addDays(TODAY,mon);
  let found=-1;
  for(let i=0;i<ALL_WEEKS.length;i++){
    const m=ALL_WEEKS[i].monday,f=addDays(m,4);
    if(m<=target&&target<=f){found=i;break;}
  }
  currentWeekIdx=found>=0?found:0;
  if(found>=0){ const d=TODAY.getDay(); currentDayIdx=(d>=1&&d<=5)?d-1:0; }
  else currentDayIdx=0;
}

function buildWeekSelect(){
  const sel=document.getElementById('weekSelect');
  sel.innerHTML='';
  ALL_WEEKS.forEach((w,wi)=>{
    const fri=addDays(w.monday,4);
    const opt=document.createElement('option');
    opt.value=wi;
    opt.textContent=`${fmtDate(w.monday)} – ${fmtDate(fri)}${isVacationWeek(wi)?' 🌴':''}`;
    if(wi===currentWeekIdx)opt.selected=true;
    sel.appendChild(opt);
  });
}

function onWeekChange(){
  currentWeekIdx=parseInt(document.getElementById('weekSelect').value);
  currentDayIdx=0;
  updateDayNav();
  renderContent();
}

function doLogin(){
  const val=document.getElementById('pwInput').value;
  if(val===PASSWORD){
    localStorage.setItem(AUTH_KEY,'true');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  } else {
    document.getElementById('loginErr').textContent='Onjuist wachtwoord.';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}
document.getElementById('pwInput').addEventListener('keydown',e=>{ if(e.key==='Enter')doLogin(); });

function renderKarTabs(){
  const w=document.getElementById('karTabs');
  w.innerHTML='';
  KARREN.forEach(k=>{
    const b=document.createElement('button');
    b.className='kar-tab'+(selectedKar===k.id?' active':'');
    b.textContent=k.name;
    b.onclick=()=>{selectedKar=k.id;renderKarTabs();renderContent();};
    w.appendChild(b);
  });
}

function updateDayNav(){
  const date=addDays(ALL_WEEKS[currentWeekIdx].monday,currentDayIdx);
  document.getElementById('dayName').textContent=DAYS_NL[currentDayIdx];
  const el=document.getElementById('dayDate');
  el.textContent=fmtDate(date);
  el.className='day-date'+(isToday(date)?' today':'');
  document.getElementById('prevDay').disabled=currentDayIdx===0&&currentWeekIdx===0;
  document.getElementById('nextDay').disabled=currentDayIdx===4&&currentWeekIdx===ALL_WEEKS.length-1;
  document.getElementById('weekSelect').value=currentWeekIdx;
}

function changeDay(delta){
  let d=currentDayIdx+delta;
  if(d<0){ if(currentWeekIdx>0){currentWeekIdx--;d=4;}else return; }
  else if(d>4){ if(currentWeekIdx<ALL_WEEKS.length-1){currentWeekIdx++;d=0;}else return; }
  currentDayIdx=d;
  updateDayNav();
  renderContent();
}

function jumpToToday(){ buildWeeks(); buildWeekSelect(); updateDayNav(); renderContent(); }

function cellKey(wi,di,hi){
  const m=ALL_WEEKS[wi].monday;
  return `${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,'0')}-${String(m.getDate()).padStart(2,'0')}_d${di}_h${hi}`;
}
function getRes(wi,di,hi){ return db[cellKey(wi,di,hi)]||[]; }
function getLaptopsUsed(wi,di,hi,karId){ return getRes(wi,di,hi).filter(r=>r.kar===karId).reduce((s,r)=>s+r.laptops,0); }

function renderContent(){
  const content=document.getElementById('mainContent');
  const wi=currentWeekIdx, di=currentDayIdx;
  const date=addDays(ALL_WEEKS[wi].monday,di);

  if(isVacationWeek(wi)){
    content.innerHTML=`<div class="vacation-banner"><div class="icon">🌴</div><div class="title">Vakantie</div><div class="sub">${fmtDate(ALL_WEEKS[wi].monday)} – ${fmtDate(addDays(ALL_WEEKS[wi].monday,4))}</div></div>`;
    return;
  }
  if(isFreeDay(date)){
    content.innerHTML=`<div class="free-banner"><div class="icon">🗓</div><div class="title">Vrije dag – ${fmtDate(date)}</div></div>`;
    return;
  }

  let html='';
  HOURS.forEach((h,hi)=>{
    const res=getRes(wi,di,hi).filter(r=>r.kar===selectedKar);
    const avail=KARREN[selectedKar].laptops-getLaptopsUsed(wi,di,hi,selectedKar);
    const ac=avail<=0?'#c62828':avail<8?'#e65100':'#1b5e20';

    let resHtml=res.length===0
      ? `<div class="hour-empty">Geen reserveringen</div>`
      : res.map(r=>{
          const p=PRIORITY_VAKKEN.includes(r.vak);
          return `<div class="res-card ${p?'res-priority':'res-normal'}">
            <div class="res-name">${r.name}</div>
            <div class="res-detail">
              ${p?'<span class="res-badge badge-prio">Voorrang</span>':''}
              <span class="res-badge badge-weeks">×${parseInt(r.weeks)||1}w</span>
              <span>${r.vak}</span><span>${r.lokaal}</span><span>${r.laptops}💻</span>
            </div>
            ${r.editedBy?`<div class="res-edited">✏️ gewijzigd door ${r.editedBy}</div>`:''}
          </div>`;
        }).join('');

    html+=`<div class="hour-card">
      <div class="hour-header" style="background:${h.hb}">
        <div><div class="hour-title">${h.label}</div><div class="hour-time">${h.time}</div></div>
        <div class="hour-avail" style="color:${ac}">${avail} vrij</div>
      </div>
      <div class="hour-body">${resHtml}</div>
    </div>`;
  });

  html+=`<div class="swipe-hint">← veeg → om van dag te wisselen · tik op de datum voor vandaag</div>`;
  content.innerHTML=html;
}

function setSyncDot(s){ const d=document.getElementById('syncDot'); d.className='sync-dot'+(s?' '+s:''); }

async function loadData(){
  try{ const c=localStorage.getItem(CACHE_KEY); if(c){db=JSON.parse(c);renderContent();setSyncDot('syncing');} }catch(e){}
  try{
    const r=await fetch(
      `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?id=eq.${SUPABASE_ROW}&select=data`,
      {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}}
    );
    const rows=await r.json();
    db=JSON.parse(rows[0]?.data||'{}');
    try{localStorage.setItem(CACHE_KEY,JSON.stringify(db));}catch(e){}
    renderContent(); setSyncDot('ok');
    setTimeout(()=>setSyncDot(''),2500);
  }catch(e){ setSyncDot('err'); }
}

// Swipe
let tx=0;
document.getElementById('mainContent').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.getElementById('mainContent').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>60)changeDay(dx<0?1:-1);
},{passive:true});

async function initApp(){
  buildWeeks(); buildWeekSelect(); renderKarTabs(); updateDayNav();
  setSyncDot('syncing'); await loadData();
}

if(localStorage.getItem(AUTH_KEY)==='true'){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='block';
  initApp();
}
</script>
</body>
</html>
